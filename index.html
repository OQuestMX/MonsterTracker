<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Story Master Hub — Epic Quest</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
/* ══════════════════════════════════════════════
   RESET & TOKENS — iPad-first, legibility-first
   ══════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f3f2ee;--surface:#fff;--surface2:#f9f8f5;
  --ink:#1a1a1a;--ink2:#444;--ink3:#666;--ink4:#999;
  --border:#ddd9d0;--border2:#ccc8be;
  --gold:#8a6f0a;--gold-light:#f0ead0;--gold-pale:#f8f5e8;
  --red:#b02828;--red-light:#fae8e8;
  --blue:#2858a0;--blue-light:#e6eefc;
  --green:#247038;--green-light:#e4f2ea;
  --purple:#6030a0;--purple-light:#ede6fa;
  --orange:#a06010;--orange-light:#faf0e2;
  --sidebar:#1c1d2e;--sidebar2:#282940;--sidebar3:#333455;
  --sidebar-text:#b0b1c8;--sidebar-dim:#7a7b9a;
  --r:8px;--r-lg:12px;
  --font:system-ui,-apple-system,'Segoe UI',sans-serif;
  --serif:Georgia,serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:15px;color:var(--ink);background:var(--bg);display:flex}

/* ══════════════════════════════════════════════
   SIDEBAR — touch-friendly, no clutter
   ══════════════════════════════════════════════ */
.sidebar{
  width:180px;min-width:180px;background:var(--sidebar);
  display:flex;flex-direction:column;padding:16px 8px;
  overflow-y:auto;user-select:none;-webkit-overflow-scrolling:touch;
}
.sidebar::-webkit-scrollbar{display:none}
.sb-brand{text-align:center;margin-bottom:4px}
.sb-brand-name{color:#c9a84c;font-size:14px;font-weight:800;letter-spacing:2px}
.sb-brand-sub{color:var(--sidebar-dim);font-size:10px;letter-spacing:.5px}
.sb-campaign{
  background:var(--sidebar2);border:1px solid var(--sidebar3);
  border-radius:var(--r);padding:10px;margin:10px 0 16px;
}
.sb-campaign-label{color:var(--sidebar-dim);font-size:9px;letter-spacing:.8px;font-weight:700}
.sb-campaign-name{color:#e8e8f0;font-size:13px;font-weight:700;margin-top:3px}
.sb-campaign-session{color:var(--sidebar-text);font-size:11px;margin-top:2px}
.sb-nav{display:flex;flex-direction:column;gap:2px}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 10px;border-radius:var(--r);min-height:44px;
  cursor:pointer;border:1px solid transparent;
}
.sb-item:active{background:var(--sidebar2)}
.sb-item.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3)}
.sb-item-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.sb-item-name{font-size:13px;font-weight:600;color:var(--sidebar-text)}
.sb-item.active .sb-item-name{color:#c9a84c}
.sb-divider{border:none;border-top:1px solid var(--sidebar3);margin:12px 4px}
.sb-players{margin-top:auto;padding-top:12px}
.sb-players-label{color:var(--sidebar-dim);font-size:9px;letter-spacing:1px;font-weight:700;text-align:center;margin-bottom:8px}
.sb-player-list{display:flex;justify-content:center;gap:8px}
.sb-player{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
}
.sb-settings{
  margin-top:12px;padding:10px;border-radius:var(--r);min-height:44px;
  text-align:center;cursor:pointer;border:1px solid var(--sidebar3);
  color:var(--sidebar-dim);font-size:11px;display:flex;align-items:center;justify-content:center;
}
.sb-settings:active{background:var(--sidebar2);color:var(--sidebar-text)}

/* ══════════════════════════════════════════════
   MAIN AREA
   ══════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;min-height:50px;
}
.breadcrumb{font-size:13px;color:var(--ink3)}
.breadcrumb span{color:var(--ink);font-weight:600}
.topbar-spacer{flex:1}
.btn{
  padding:10px 16px;border-radius:var(--r);font-size:13px;
  font-weight:600;font-family:var(--font);cursor:pointer;
  border:1px solid var(--border);background:var(--surface);
  color:var(--ink2);display:inline-flex;align-items:center;gap:6px;
  min-height:44px;
}
.btn:active{background:var(--bg);border-color:var(--border2)}
.btn-gold{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}
.btn-primary{background:var(--gold);border-color:var(--gold);color:#fff}
.btn-primary:active{background:#6a5808}
.content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* ══════════════════════════════════════════════
   VIEW SYSTEM
   ══════════════════════════════════════════════ */
.view{display:none}
.view.active{display:block}

/* ══════════════════════════════════════════════
   SECTION HEADERS
   ══════════════════════════════════════════════ */
.section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px}
.section-desc{font-size:14px;color:var(--ink3);margin-bottom:16px;line-height:1.5}

/* ══════════════════════════════════════════════
   CAMPAIGN: BEATS
   ══════════════════════════════════════════════ */
.beats-row{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.beat-card{
  flex:0 0 190px;background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;
}
.beat-card:active{border-color:var(--gold)}
.beat-card.active{border-color:var(--gold);background:var(--gold-pale)}
.beat-card.dim{opacity:.4}
.beat-card .beat-num{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.beat-card .beat-name{font-size:15px;font-weight:700;color:var(--ink);margin-top:4px;font-family:var(--serif)}
.beat-card .beat-status{font-size:11px;color:var(--ink3);margin-top:6px}
.beat-card .beat-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.beat-card .beat-fill{height:100%;background:var(--gold);border-radius:2px}
.beat-connector{flex-shrink:0;display:flex;align-items:center;color:var(--border2);font-size:16px}

/* ══════════════════════════════════════════════
   CAMPAIGN: SCENE CARDS
   ══════════════════════════════════════════════ */
.scenes-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.scenes-header .section-label{margin:0}
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:24px}
.scene-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:16px;cursor:pointer;
  position:relative;overflow:hidden;
}
.scene-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.scene-card.combat::before{background:var(--red)}
.scene-card.social::before{background:var(--blue)}
.scene-card.exploration::before{background:var(--green)}
.scene-card.revelation::before{background:var(--purple)}
.scene-card.sporadic::before{background:var(--gold)}
.scene-card.sporadic{border-style:dashed}
.scene-badge{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700;margin-bottom:8px}
.badge-combat{background:var(--red-light);color:var(--red)}
.badge-social{background:var(--blue-light);color:var(--blue)}
.badge-exploration{background:var(--green-light);color:var(--green)}
.badge-revelation{background:var(--purple-light);color:var(--purple)}
.badge-sporadic{background:var(--gold-pale);color:var(--gold)}
.scene-status{float:right;font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--r)}
.status-debrief{background:var(--green-light);color:var(--green)}
.status-active{background:var(--gold-pale);color:var(--gold)}
.status-ready{background:var(--bg);color:var(--ink3)}
.scene-card .scene-name{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px;font-family:var(--serif)}
.scene-card .scene-detail{font-size:13px;color:var(--ink3);line-height:1.5;margin-bottom:2px}
.scene-flag{margin-top:10px;padding:8px 10px;border-radius:var(--r);font-size:12px;line-height:1.4;border:1px dashed}
.flag-consequence{background:rgba(176,40,40,.04);border-color:var(--red);color:var(--red)}
.flag-personal{background:rgba(96,48,160,.04);border-color:var(--purple);color:var(--purple)}

/* ══════════════════════════════════════════════
   SCENE BUILDER
   ══════════════════════════════════════════════ */
.builder-layout{display:flex;gap:16px}
.builder-main{flex:1;min-width:0}
.builder-side{width:280px;min-width:280px}
@media(max-width:900px){
  .builder-layout{flex-direction:column}
  .builder-side{width:100%;min-width:0}
}
.builder-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.builder-tab{
  padding:10px 16px;border-radius:var(--r);font-size:13px;
  font-weight:600;cursor:pointer;border:2px solid var(--border);
  background:var(--surface);color:var(--ink3);min-height:44px;
  display:flex;align-items:center;
}
.builder-tab:active{background:var(--bg)}
.builder-tab.active{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}
.builder-tab.tab-debrief{color:var(--red)}
.builder-tab.tab-debrief.active{background:var(--red-light);border-color:var(--red);color:var(--red)}
.builder-panel{display:none}
.builder-panel.active{display:block}
.form-section{margin-bottom:20px}
.form-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);margin-bottom:8px}
.form-input{
  width:100%;padding:12px 14px;border:2px solid var(--border);
  border-radius:var(--r);font-size:15px;font-family:var(--font);
  color:var(--ink);background:var(--surface2);resize:vertical;
}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-input::placeholder{color:var(--ink4)}
textarea.form-input{min-height:70px;line-height:1.5}
.stakes-row{display:flex;gap:10px}
@media(max-width:700px){.stakes-row{flex-direction:column}}
.stake-box{flex:1;padding:14px;border-radius:var(--r-lg);border:2px dashed}
.stake-fail{background:rgba(176,40,40,.03);border-color:var(--red)}
.stake-win{background:rgba(36,112,56,.03);border-color:var(--green)}
.stake-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:8px}
.stake-fail .stake-label{color:var(--red)}
.stake-win .stake-label{color:var(--green)}
.stake-box .form-input{background:transparent;border-color:transparent}
.stake-box .form-input:focus{border-color:inherit}

/* TYPE SELECTOR — color dots, no emoji */
.type-selector{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.type-option{
  padding:10px 18px;border-radius:var(--r);border:2px solid var(--border);
  cursor:pointer;font-size:14px;font-weight:600;background:var(--surface);
  min-height:44px;display:flex;align-items:center;gap:8px;color:var(--ink2);
}
.type-option .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.type-option.selected{border-width:2px}
.type-option[data-type="combat"] .dot{background:var(--red)}
.type-option[data-type="social"] .dot{background:var(--blue)}
.type-option[data-type="exploration"] .dot{background:var(--green)}
.type-option[data-type="revelation"] .dot{background:var(--purple)}
.type-option[data-type="combat"].selected{border-color:var(--red);background:var(--red-light);color:var(--red)}
.type-option[data-type="social"].selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.type-option[data-type="exploration"].selected{border-color:var(--green);background:var(--green-light);color:var(--green)}
.type-option[data-type="revelation"].selected{border-color:var(--purple);background:var(--purple-light);color:var(--purple)}

/* ══════════════════════════════════════════════
   LAIR ACTIONS — checkboxes, not chips
   ══════════════════════════════════════════════ */
.lair-section{padding:14px;border-radius:var(--r-lg);background:var(--orange-light);border:2px dashed var(--orange)}
.lair-check{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px;color:var(--ink2);cursor:pointer}
.lair-check input[type="checkbox"]{width:20px;height:20px;accent-color:var(--orange)}
.combat-only{display:none}
.combat-only.visible{display:block}

/* ══════════════════════════════════════════════
   NPC / CREATURE / LOOT CARDS
   ══════════════════════════════════════════════ */
.npc-card,.creature-card,.loot-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;
}
.npc-card .npc-name,.creature-card .creature-name,.loot-card .loot-name{font-size:15px;font-weight:700;font-family:var(--serif)}
.npc-card .npc-role,.creature-card .creature-type,.loot-card .loot-type{font-size:12px;color:var(--ink3);margin-top:2px}
.npc-card .npc-detail,.creature-card .creature-abilities,.loot-card .loot-desc{font-size:13px;color:var(--ink2);margin-top:8px;line-height:1.5}
.npc-card .npc-voice{font-size:14px;color:var(--gold);font-style:italic;margin-top:6px}
.creature-stats-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.creature-stat{padding:4px 10px;border-radius:var(--r);font-size:12px;font-weight:600;background:var(--bg);color:var(--ink2);border:1px solid var(--border)}
.creature-stat.hp{background:var(--red-light);color:var(--red);border-color:var(--red)}
.creature-stat.dmg{background:var(--orange-light);color:var(--orange);border-color:var(--orange)}
.creature-stat.special{background:var(--purple-light);color:var(--purple);border-color:var(--purple)}
.difficulty-tag{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700}
.diff-easy{background:var(--green-light);color:var(--green)}
.diff-medium{background:var(--orange-light);color:var(--orange)}
.diff-hard{background:var(--red-light);color:var(--red)}
.diff-boss{background:var(--purple-light);color:var(--purple)}
.loot-card .loot-effect{font-size:13px;color:var(--gold);font-style:italic;margin-top:6px;padding:8px 12px;background:var(--gold-pale);border-radius:var(--r)}
.loot-rarity{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700;float:right}
.rarity-common{background:var(--bg);color:var(--ink3)}
.rarity-uncommon{background:var(--green-light);color:var(--green)}
.rarity-rare{background:var(--blue-light);color:var(--blue)}
.rarity-legendary{background:var(--gold-pale);color:var(--gold)}
.loot-scene-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;margin-top:8px;padding:4px 8px;background:var(--bg);border-radius:var(--r);color:var(--ink3)}

/* VILLAIN */
.villain-card-lib{background:var(--surface);border:2px solid var(--red);border-left:5px solid var(--red);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.villain-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--red);margin-bottom:4px}
.villain-status{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700}
.vs-active{background:var(--red-light);color:var(--red)}
.vs-prepared{background:var(--gold-pale);color:var(--gold)}

/* DIFFICULTY METER */
.difficulty-meter{padding:12px 14px;border-radius:var(--r-lg);border:2px solid var(--border);background:var(--surface2);margin-top:12px}
.difficulty-meter .dm-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--ink3);margin-bottom:8px}
.dm-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.dm-fill{height:100%;border-radius:4px}
.dm-fill.medium{background:var(--orange);width:55%}
.dm-text{font-size:12px;display:flex;justify-content:space-between}

/* ══════════════════════════════════════════════
   LIBRARY
   ══════════════════════════════════════════════ */
.lib-category-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.lib-cat-tab{
  padding:10px 18px;border-radius:var(--r);font-size:13px;
  font-weight:600;cursor:pointer;border:2px solid var(--border);
  background:var(--surface);color:var(--ink3);min-height:44px;
  display:flex;align-items:center;gap:6px;
}
.lib-cat-tab:active{background:var(--bg)}
.lib-cat-tab.active{border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}
.lib-cat-tab .tab-count{font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;color:var(--ink4);font-weight:700}
.lib-cat-tab.active .tab-count{background:rgba(138,111,10,.12);color:var(--gold)}
.lib-content{display:none}
.lib-content.active{display:block}
.library-layout{display:flex;gap:16px;height:calc(100vh - 220px)}
@media(max-width:900px){
  .library-layout{flex-direction:column;height:auto}
  .library-list{width:100% !important;min-width:0 !important;max-height:300px}
}
.library-list{
  width:300px;min-width:300px;background:var(--surface);
  border:2px solid var(--border);border-radius:var(--r-lg);overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.library-list::-webkit-scrollbar{display:none}
.library-search{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.library-search input{
  width:100%;padding:10px 12px;border:2px solid var(--border);
  border-radius:var(--r);font-size:14px;font-family:var(--font);
}
.library-search input:focus{outline:none;border-color:var(--gold)}
.library-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px}
.library-item:active{background:var(--bg)}
.library-item.active{background:var(--gold-pale);border-left:4px solid var(--gold)}
.library-item .li-name{font-size:14px;font-weight:600}
.library-item .li-role{font-size:12px;color:var(--ink3);margin-top:2px}
.library-item .li-status{float:right}
.library-detail{
  flex:1;background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:24px;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.library-detail::-webkit-scrollbar{display:none}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink4);font-size:15px}
.detail-header{margin-bottom:20px}
.detail-name{font-size:22px;font-weight:700;font-family:var(--serif);color:var(--ink)}
.detail-role{font-size:14px;color:var(--ink3);margin-top:3px}
.detail-section{margin-bottom:16px}
.detail-section-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);margin-bottom:6px}
.detail-section-value{font-size:14px;color:var(--ink);line-height:1.6}
.detail-voice{
  font-size:15px;color:var(--gold);font-style:italic;
  padding:14px 18px;background:var(--gold-pale);border-radius:var(--r);
  border-left:4px solid var(--gold);margin-top:10px;font-family:var(--serif);
}
.creature-terrain{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--green);margin-right:12px}

/* ══════════════════════════════════════════════
   PLAYER CARDS
   ══════════════════════════════════════════════ */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.player-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:18px 20px}
.player-card-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.player-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.player-card-name{font-size:18px;font-weight:700;font-family:var(--serif)}
.player-card-class{font-size:13px;color:var(--ink3)}
.player-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.player-tag{padding:4px 10px;border-radius:var(--r);font-size:12px;font-weight:600;background:var(--bg);color:var(--ink2);border:1px solid var(--border)}
.player-tag.faction{background:var(--gold-pale);color:var(--gold);border-color:var(--gold)}
.player-objective{padding:10px 12px;border-radius:var(--r);background:var(--purple-light);border:1px dashed var(--purple);font-size:13px;color:var(--purple);line-height:1.5;margin-top:10px}
.player-objective-label{font-weight:700;font-size:10px;letter-spacing:.5px;margin-bottom:4px}
.echo-tracker{display:flex;align-items:center;gap:10px;margin-top:12px;padding:8px 12px;background:var(--gold-pale);border-radius:var(--r)}
.echo-tracker-label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.echo-dots{display:flex;gap:6px}
.echo-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px}
.echo-dot.filled{background:var(--gold);color:#fff}

/* ══════════════════════════════════════════════
   PLACEHOLDER
   ══════════════════════════════════════════════ */
.placeholder-view{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center}
.placeholder-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.placeholder-title{font-size:18px;font-weight:700;color:var(--ink3);margin-bottom:8px}
.placeholder-desc{font-size:14px;color:var(--ink4);max-width:400px;line-height:1.6}

/* ══════════════════════════════════════════════
   COMBAT TRACKER
   ══════════════════════════════════════════════ */
.tracker-bar{display:flex;align-items:center;gap:16px;padding:14px 16px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);margin-bottom:16px;flex-wrap:wrap}
.tracker-stat{text-align:center;min-width:60px}
.tracker-stat-label{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--ink3)}
.tracker-stat-value{font-size:22px;font-weight:800;color:var(--ink)}
.tracker-stat-value.gold{color:var(--gold)}

.initiative-bar{display:flex;gap:6px;overflow-x:auto;padding:10px 0;-webkit-overflow-scrolling:touch}
.initiative-bar::-webkit-scrollbar{display:none}
.init-chip{
  flex-shrink:0;padding:8px 14px;border-radius:var(--r);
  font-size:13px;font-weight:600;border:2px solid var(--border);
  background:var(--surface);cursor:pointer;min-height:44px;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.init-chip.active{border-color:var(--green);background:var(--green-light);color:var(--green)}
.init-chip.done{opacity:.4;text-decoration:line-through}
.init-chip.dead{opacity:.25;text-decoration:line-through}
.init-chip.player{border-color:var(--blue);color:var(--blue)}
.init-chip.player.active{border-color:var(--blue);background:var(--blue-light)}
.init-chip.sinergia-eligible{border-style:dashed;border-color:var(--gold)}

.unit-card-tracker{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:16px;margin-bottom:10px;
}
.unit-card-tracker.active-unit{border-color:var(--green);background:#f4faf6}
.unit-card-tracker.dead-unit{opacity:.35}
.unit-header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.unit-name{font-size:17px;font-weight:700;font-family:var(--serif)}
.unit-meta{font-size:12px;color:var(--ink3)}
.hp-section{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.hp-display{font-size:20px;font-weight:800;min-width:80px}
.hp-bar{flex:1;min-width:120px;height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.hp-fill{height:100%;border-radius:5px;transition:width .2s}
.hp-controls{display:flex;gap:6px;align-items:center}
.hp-controls input{width:70px;padding:8px 10px;border:2px solid var(--border);border-radius:var(--r);font-size:15px;text-align:center;font-family:var(--font)}
.hp-controls input:focus{outline:none;border-color:var(--gold)}
.btn-damage{background:var(--red-light);border-color:var(--red);color:var(--red);min-height:44px}
.btn-heal{background:var(--green-light);border-color:var(--green);color:var(--green);min-height:44px}
.actions-row{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;align-items:center}
.action-check{display:flex;align-items:center;gap:8px;font-size:14px;min-height:44px;cursor:pointer}
.action-check input[type="checkbox"]{width:22px;height:22px}
.conditions-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.condition-tag{padding:4px 10px;border-radius:var(--r);font-size:11px;font-weight:600;background:var(--red-light);color:var(--red)}
.abilities-compact{margin-top:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r)}
.ability-line{font-size:13px;color:var(--ink2);padding:4px 0;border-bottom:1px solid var(--border)}
.ability-line:last-child{border:none}
.ability-name{font-weight:700;color:var(--ink)}

.lair-panel{background:var(--orange-light);border:2px dashed var(--orange);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.lair-panel .form-label{color:var(--orange)}
.lair-action-btn{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--surface);border:2px solid var(--border);border-radius:var(--r);
  font-size:14px;cursor:pointer;min-height:44px;width:100%;margin-bottom:6px;
  color:var(--ink2);
}
.lair-action-btn:active{background:var(--orange-light);border-color:var(--orange)}
.lair-action-btn.used{opacity:.35;text-decoration:line-through}

.echo-panel{background:var(--gold-pale);border:2px solid var(--gold);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.echo-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(138,111,10,.15);min-height:44px}
.echo-row:last-child{border:none}
.echo-player-name{font-size:15px;font-weight:600}
.echo-btn{
  padding:8px 14px;border-radius:var(--r);font-size:14px;font-weight:700;
  background:var(--gold);color:#fff;border:none;cursor:pointer;min-height:44px;
}
.echo-btn:active{background:#6a5808}
.echo-count{font-size:18px;font-weight:800;color:var(--gold);min-width:30px;text-align:center}

.no-session{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;text-align:center;gap:16px}
.no-session-title{font-size:18px;font-weight:700;color:var(--ink3)}
.no-session-desc{font-size:14px;color:var(--ink4);max-width:400px;line-height:1.6}

/* ══════════════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════════════ */
.flex-between{display:flex;align-items:center;justify-content:space-between}
.mb-16{margin-bottom:16px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px}
.modal::-webkit-scrollbar{display:none}
.modal-title{font-size:18px;font-weight:700;font-family:var(--serif);margin-bottom:16px;color:var(--ink)}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink4)}
.empty-state-title{font-size:16px;font-weight:600;color:var(--ink3);margin-bottom:8px}
.empty-state-desc{font-size:14px;margin-bottom:16px;line-height:1.5}
.entity-list-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:space-between}
.entity-list-item:active{background:var(--bg)}
.entity-list-item.selected{background:var(--gold-pale);border-left:4px solid var(--gold)}
.delete-btn{color:var(--red);background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}
.inline-edit{background:var(--surface2);border:2px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:14px;width:100%;font-family:var(--font);color:var(--ink)}
.inline-edit:focus{outline:none;border-color:var(--gold)}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.move-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px}
.move-item input[type=checkbox]{width:20px;height:20px}
.move-done{text-decoration:line-through;color:var(--ink4)}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">EPIC</div><div class="sb-brand-sub">STORY MASTER</div></div>
  <div class="sb-campaign" id="sb-campaign-info"></div>
  <nav class="sb-nav">
    <div class="sb-item active" onclick="nav('campaign')"><div class="sb-item-icon">📜</div><div class="sb-item-name">Campaña</div></div>
    <div class="sb-item" onclick="nav('scenes')"><div class="sb-item-icon">🎬</div><div class="sb-item-name">Escenas</div></div>
    <div class="sb-item" onclick="nav('library')"><div class="sb-item-icon">📖</div><div class="sb-item-name">Biblioteca</div></div>
    <div class="sb-item" onclick="nav('players')"><div class="sb-item-icon">👥</div><div class="sb-item-name">Personajes</div></div>
    <div class="sb-item" onclick="nav('session')"><div class="sb-item-icon">⚡</div><div class="sb-item-name">Sesión en Vivo</div></div>
  </nav>
  <hr class="sb-divider">
  <div class="sb-players" id="sb-players-bar"></div>
  <div class="sb-settings" onclick="nav('settings')">⚙️ Configuración</div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="topbar-spacer"></div>
    <button class="btn btn-gold" onclick="openModal('scene',null)">+ Escena rápida</button>
  </div>
  <div class="content">
    <div class="view active" id="view-campaign"><div id="campaign-content"></div></div>
    <div class="view" id="view-scenes"><div id="scenes-content"></div></div>
    <div class="view" id="view-library"><div id="library-content"></div></div>
    <div class="view" id="view-players"><div id="players-content"></div></div>
    <div class="view" id="view-session"><div id="session-content"></div></div>
    <div class="view" id="view-settings"><div id="settings-content"></div></div>
  </div>
</div>
<div id="modal-root"></div>

<script src="gamedata.js"></script>
<script>
/* ══════════════════════════════════════════════
   DB LAYER
   ══════════════════════════════════════════════ */
var DB_PREFIX='eqsm_';
var DB_TABLES=['campaign','sessions','scenes','npcs','villains','bestiary','loot','players'];
function dbKey(t){return DB_PREFIX+t}
function dbLoad(t){try{var d=localStorage.getItem(dbKey(t));return d?JSON.parse(d):null}catch(e){return null}}
function dbSave(t,d){try{localStorage.setItem(dbKey(t),JSON.stringify(d));return true}catch(e){return false}}
function dbGetAll(t){return dbLoad(t)||[]}
function dbGetById(t,id){return dbGetAll(t).find(function(i){return i.id===id})||null}
function dbCreate(t,item){var items=dbGetAll(t);if(!item.id)item.id=t.substring(0,3)+'-'+Date.now().toString(36);items.push(item);dbSave(t,items);return item}
function dbUpdate(t,id,updates){var items=dbGetAll(t);var idx=items.findIndex(function(i){return i.id===id});if(idx===-1)return;Object.keys(updates).forEach(function(k){items[idx][k]=updates[k]});dbSave(t,items);return items[idx]}
function dbDelete(t,id){dbSave(t,dbGetAll(t).filter(function(i){return i.id!==id}))}
function dbSaveSingle(t,d){localStorage.setItem(dbKey(t),JSON.stringify(d))}
function dbLoadSingle(t){try{var d=localStorage.getItem(dbKey(t));return d?JSON.parse(d):null}catch(e){return null}}

function seedIfEmpty(){
  if(dbLoad('_initialized'))return;
  DB_TABLES.forEach(function(t){if(!dbLoad(t))dbSave(t,t==='campaign'?null:[])});
  dbSave('_initialized',true);
}
seedIfEmpty();

/* ══════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════ */
var currentView='campaign';
var selectedLibTab='npcs';
var selectedLibItem=null;
var selectedSceneId=null;
var selectedBeatIdx=0;
var combat=null;
var expandedUnits={};
var dragSrc=null;
var modalStack=[];

/* ══════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════ */
function resolvePlayer(p){
  if(!p)return null;
  var G=typeof GAMEDATA!=='undefined'?GAMEDATA:null;
  var cls=G?G.classes.find(function(c){return c.id===p.classId}):null;
  var sub=cls?cls.subclasses.find(function(s){return s.id===p.subclassId}):null;
  var kit=G?G.kits.find(function(k){return k.id===p.kitId}):null;
  var fac=G?G.factions.find(function(f){return f.id===p.factionId}):null;
  var ab=[];
  if(cls)cls.abilities.forEach(function(a){ab.push(a)});
  if(sub)sub.abilities.forEach(function(a){ab.push(a)});
  if(kit)ab.push({name:kit.ability.name,type:'Kit',desc:kit.ability.desc,cost:kit.ability.cost});
  return{id:p.id,name:p.name,initial:p.initial||p.name.charAt(0),bg:p.bg||'#444',fg:p.fg||'#fff',echo:p.echo||0,
    cls:cls?cls.nameEs:(p.classId||''),sub:sub?sub.name:'',kit:kit?kit.name:'',plano:p.plano||1,
    faction:fac?fac.name:(p.factionId||''),factionColor:fac?fac.color:'#666',
    hp:(G?G.rules.hpBase:10)+(kit?kit.hpBonus:0),aenRegen:(G?G.rules.aenPerTurn:2)+(kit?kit.aenBonus:0),
    abilities:ab,backstory:p.backstory||''}
}

function getHpColor(pct){if(pct>60)return'var(--green)';if(pct>25)return'var(--orange)';return'var(--red)'}
function diffLabel(d){return{easy:'Fácil',medium:'Medio',hard:'Duro',boss:'Jefe'}[d]||d}
function rarityClass(r){return{common:'rarity-common',uncommon:'rarity-uncommon',rare:'rarity-rare',legendary:'rarity-legendary'}[r]||'rarity-common'}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,4)}

/* ══════════════════════════════════════════════
   NAVIGATION
   ══════════════════════════════════════════════ */
var breadcrumbs={campaign:'📜 <span>Campaña</span>',scenes:'🎬 <span>Scene Builder</span>',library:'📖 <span>Biblioteca</span>',players:'👥 <span>Personajes</span>',session:'⚡ <span>Sesión en Vivo</span>',settings:'⚙️ <span>Configuración</span>'};
function nav(id){
  currentView=id;
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  var t=document.getElementById('view-'+id);if(t)t.classList.add('active');
  document.querySelectorAll('.sb-item').forEach(function(i){i.classList.remove('active')});
  var items=document.querySelectorAll('.sb-item');
  var map={campaign:0,scenes:1,library:2,players:3,session:4};
  if(map[id]!==undefined)items[map[id]].classList.add('active');
  document.getElementById('breadcrumb').innerHTML=breadcrumbs[id]||'';
  renderView(id);
}

function renderView(id){
  if(id==='campaign')renderCampaign();
  if(id==='scenes')renderSceneBuilder(selectedSceneId);
  if(id==='library')renderLibrary();
  if(id==='players')renderPlayers();
  if(id==='session')renderSession();
  if(id==='settings')renderSettings();
  renderSidebar();
}

function renderSidebar(){
  var camp=dbLoadSingle('campaign');
  var ci=document.getElementById('sb-campaign-info');
  if(ci){
    if(camp){ci.innerHTML='<div class="sb-campaign-label">CAMPAÑA ACTIVA</div><div class="sb-campaign-name">'+camp.name+'</div>'}
    else{ci.innerHTML='<div class="sb-campaign-label">SIN CAMPAÑA</div>'}
  }
  var pb=document.getElementById('sb-players-bar');
  if(pb){
    var pls=dbGetAll('players');
    if(pls.length===0){pb.innerHTML=''}
    else{
      var h='<div class="sb-players-label">EN MESA</div><div class="sb-player-list">';
      pls.forEach(function(p){h+='<div class="sb-player" style="background:'+(p.bg||'#444')+';color:'+(p.fg||'#fff')+'" title="'+p.name+'">'+( p.initial||p.name.charAt(0))+'</div>'});
      h+='</div>';pb.innerHTML=h;
    }
  }
}

/* ══════════════════════════════════════════════
   RENDER: CAMPAIGN
   ══════════════════════════════════════════════ */
function renderCampaign(){
  var el=document.getElementById('campaign-content');if(!el)return;
  var camp=dbLoadSingle('campaign');
  if(!camp){
    el.innerHTML='<div class="empty-state"><div class="empty-state-title">No hay campaña activa</div><div class="empty-state-desc">Crea una campaña para empezar a planear tus sesiones y escenas.</div><button class="btn btn-primary" onclick="openModal(\'campaign\',null)">Crear campaña</button></div>';
    return;
  }
  var h='<div class="section-label">'+camp.name+'</div>';
  var arcs=camp.arcs||[];
  var arc=arcs[0]||{beats:[]};
  // Beats
  h+='<div class="beats-row">';
  (arc.beats||[]).forEach(function(b,i){
    var cls='beat-card'+(i===selectedBeatIdx?' active':'');
    h+='<div class="'+cls+'" onclick="selectedBeatIdx='+i+';renderCampaign()">';
    h+='<div class="beat-num">BEAT '+(i+1)+'</div><div class="beat-name">'+b.name+'</div></div>';
    if(i<arc.beats.length-1)h+='<div class="beat-connector">—</div>';
  });
  h+='<div style="flex-shrink:0;display:flex;align-items:center"><button class="btn" onclick="addBeat()">+</button></div>';
  h+='</div>';
  // Scenes for selected beat
  var scenes=dbGetAll('scenes');
  var beat=arc.beats[selectedBeatIdx];
  var beatScenes=beat?scenes.filter(function(s){return(beat.scenes||[]).indexOf(s.id)>-1}):[];
  // Also show unassigned scenes
  var allAssigned=[];arcs.forEach(function(a){(a.beats||[]).forEach(function(b){allAssigned=allAssigned.concat(b.scenes||[])})});
  var unassigned=scenes.filter(function(s){return allAssigned.indexOf(s.id)===-1});
  h+='<div class="scenes-header flex-between"><div class="section-label" style="margin:0">ESCENAS'+(beat?' — '+beat.name:'')+'</div><button class="btn" onclick="openModal(\'scene\',null)">+ Nueva escena</button></div>';
  var displayScenes=beat?beatScenes:unassigned;
  if(displayScenes.length===0){
    h+='<div class="empty-state"><div class="empty-state-desc">'+(beat?'No hay escenas en este beat.':'No hay escenas sin asignar.')+'</div></div>';
  } else {
    h+='<div class="scene-grid">';
    displayScenes.forEach(function(s){
      var typeClass=s.type==='combat'?'combat':'social';
      var badge=s.type==='combat'?'badge-combat':'badge-social';
      var badgeText=s.type==='combat'?'Combate':'Narrativa';
      var statusCls=s.debrief?'status-debrief':(s.status==='active'?'status-active':'status-ready');
      var statusText=s.debrief?'✓ Debrief':(s.status==='active'?'▶ Activa':'Lista');
      h+='<div class="scene-card '+typeClass+'" onclick="selectedSceneId=\''+s.id+'\';nav(\'scenes\')">';
      h+='<span class="scene-badge '+badge+'">'+badgeText+'</span>';
      if(s.sporadic)h+=' <span style="font-size:11px;color:var(--gold)">(esporádica)</span>';
      h+='<span class="scene-status '+statusCls+'">'+statusText+'</span>';
      h+='<div class="scene-name">'+s.name+'</div>';
      if(s.setup&&s.setup.hook)h+='<div class="scene-detail">'+s.setup.hook+'</div>';
      if(s.type==='combat')h+='<button class="btn btn-primary" style="margin-top:10px;width:100%;justify-content:center" onclick="event.stopPropagation();startCombatFromScene(\''+s.id+'\')">Iniciar combate</button>';
      // Debrief consequences
      if(s.debrief&&s.debrief.consequences&&s.debrief.consequences.length>0){
        s.debrief.consequences.forEach(function(c){
          h+='<div class="scene-flag flag-consequence">⚠ '+c+'</div>';
        });
      }
      h+='</div>';
    });
    h+='</div>';
  }
  // Unassigned scenes section
  if(beat&&unassigned.length>0){
    h+='<div class="section-label" style="margin-top:20px">ESCENAS SIN ASIGNAR</div><div class="scene-grid">';
    unassigned.forEach(function(s){
      h+='<div class="scene-card social" onclick="selectedSceneId=\''+s.id+'\';nav(\'scenes\')"><div class="scene-name">'+s.name+'</div><div class="scene-detail">'+((s.setup&&s.setup.hook)||'Sin hook')+'</div></div>';
    });
    h+='</div>';
  }
  el.innerHTML=h;
}

function addBeat(){
  var camp=dbLoadSingle('campaign');
  if(!camp)return;
  var name=prompt('Nombre del beat:');
  if(!name)return;
  if(!camp.arcs)camp.arcs=[{id:'arc-1',name:'Arco I',beats:[]}];
  camp.arcs[0].beats.push({id:'beat-'+uid(),name:name,order:camp.arcs[0].beats.length+1,scenes:[]});
  dbSaveSingle('campaign',camp);
  renderCampaign();
}

/* ══════════════════════════════════════════════
   RENDER: LIBRARY
   ══════════════════════════════════════════════ */
function renderLibrary(){
  var el=document.getElementById('library-content');if(!el)return;
  var tabs=[{id:'npcs',label:'NPCs'},{id:'villains',label:'Villanos'},{id:'bestiary',label:'Bestiario'},{id:'loot',label:'Loot'}];
  var h='<div class="section-label">BIBLIOTECA</div>';
  h+='<div class="lib-category-tabs">';
  tabs.forEach(function(t){
    var count=dbGetAll(t.id).length;
    h+='<div class="lib-cat-tab'+(selectedLibTab===t.id?' active':'')+'" onclick="selectedLibTab=\''+t.id+'\';selectedLibItem=null;renderLibrary()">'+t.label+' <span class="tab-count">'+count+'</span></div>';
  });
  h+='</div>';
  var items=dbGetAll(selectedLibTab);
  var tableLabel={npcs:'NPC',villains:'Villano',bestiary:'Criatura',loot:'Item'}[selectedLibTab];
  h+='<div style="margin-bottom:12px"><button class="btn btn-primary" onclick="openModal(\''+selectedLibTab+'\',null)">+ Nuevo '+tableLabel+'</button></div>';
  h+='<div class="library-layout">';
  // List
  h+='<div class="library-list">';
  h+='<div class="library-search"><input type="text" id="lib-search" placeholder="Buscar..." oninput="filterLibrary(this.value)"></div>';
  h+='<div id="lib-list-items">';
  h+=renderLibList(items);
  h+='</div></div>';
  // Detail
  h+='<div class="library-detail" id="lib-detail">';
  if(selectedLibItem){h+=renderLibDetail(selectedLibTab,selectedLibItem)}
  else{h+='<div class="empty-state"><div class="empty-state-desc">Selecciona un item de la lista</div></div>'}
  h+='</div></div>';
  el.innerHTML=h;
}

function renderLibList(items){
  if(items.length===0)return'<div class="empty-state"><div class="empty-state-desc">Vacío</div></div>';
  var h='';
  items.forEach(function(item){
    var sel=selectedLibItem===item.id?' selected':'';
    h+='<div class="entity-list-item'+sel+'" onclick="selectedLibItem=\''+item.id+'\';renderLibrary()">';
    h+='<div><div style="font-size:14px;font-weight:600">'+item.name+'</div>';
    if(item.role)h+='<div style="font-size:12px;color:var(--ink3)">'+item.role+'</div>';
    if(item.type)h+='<div style="font-size:12px;color:var(--ink3)">'+item.type+(item.difficulty?' · '+diffLabel(item.difficulty):'')+'</div>';
    if(item.rarity)h+='<div style="font-size:12px;color:var(--ink3)">'+item.type+' · <span class="'+rarityClass(item.rarity)+'">'+item.rarity+'</span></div>';
    h+='</div>';
    h+='<button class="delete-btn" onclick="event.stopPropagation();if(confirm(\'¿Eliminar '+item.name+'?\')){dbDelete(\''+selectedLibTab+'\',\''+item.id+'\');selectedLibItem=null;renderLibrary()}" title="Eliminar">×</button>';
    h+='</div>';
  });
  return h;
}

function renderLibDetail(table,id){
  var item=dbGetById(table,id);
  if(!item)return'<div class="empty-state">No encontrado</div>';
  var h='<div style="display:flex;justify-content:space-between;align-items:start"><div class="detail-header"><div class="detail-name">'+item.name+'</div>';
  if(item.role)h+='<div class="detail-role">'+item.role+'</div>';
  if(item.type&&table==='bestiary')h+='<div class="detail-role">'+item.type+' · <span class="difficulty-tag diff-'+(item.difficulty||'medium')+'">'+diffLabel(item.difficulty)+'</span></div>';
  if(item.rarity)h+='<div class="detail-role">'+item.type+' · <span class="loot-rarity '+rarityClass(item.rarity)+'">'+item.rarity+'</span></div>';
  h+='</div><button class="btn" onclick="openModal(\''+table+'\',\''+item.id+'\')">Editar</button></div>';
  // Fields based on table
  var fields=[];
  if(table==='npcs')fields=[['MOTIVACIÓN','motivation'],['LO QUE SABE','knows'],['LO QUE QUIERE','wants']];
  if(table==='villains'){fields=[['MOTIVACIÓN','motivation'],['ARCO NARRATIVO','arc']];
    if(item.stats)h+='<div class="detail-section"><div class="detail-section-label">STATS</div><div class="creature-stats-row"><span class="creature-stat hp">HP '+item.stats.hp+'</span><span class="creature-stat dmg">Daño '+item.stats.dmg+'</span>'+(item.stats.special?'<span class="creature-stat special">'+item.stats.special+'</span>':'')+'</div></div>';
  }
  if(table==='bestiary'){fields=[['DESCRIPCIÓN','description']];
    if(item.hp)h+='<div class="detail-section"><div class="detail-section-label">STATS</div><div class="creature-stats-row"><span class="creature-stat hp">HP '+item.hp+'</span><span class="creature-stat dmg">Daño '+item.dmg+'</span>'+(item.resist?'<span class="creature-stat">Resist: '+item.resist+'</span>':'')+'</div></div>';
    if(item.terrain)h+='<div class="detail-section"><div class="detail-section-label">TERRENO</div><div>'+item.terrain.join(' · ')+'</div></div>';
  }
  if(table==='loot'){fields=[['DESCRIPCIÓN','description'],['EFECTO','effect']]}
  fields.forEach(function(f){
    if(item[f[1]])h+='<div class="detail-section"><div class="detail-section-label">'+f[0]+'</div><div class="detail-section-value">'+item[f[1]]+'</div></div>';
  });
  if(item.voice)h+='<div class="detail-voice">"'+item.voice+'"</div>';
  if(item.abilities&&item.abilities.length>0){
    h+='<div class="detail-section"><div class="detail-section-label">HABILIDADES</div>';
    item.abilities.forEach(function(a){h+='<div class="ability-line"><span class="ability-name">'+a.name+'</span> <span style="color:var(--ink4)">['+a.type+']</span><div style="font-size:13px;color:var(--ink3)">'+a.desc+'</div></div>'});
    h+='</div>';
  }
  if(item.moves){
    h+='<div class="detail-section"><div class="detail-section-label">MOVES ENTRE SESIONES</div>';
    item.moves.forEach(function(m){h+='<div class="move-item"><input type="checkbox" '+(m.done?'checked':'')+' onchange="toggleMove(\''+item.id+'\',\''+m.text.replace(/'/g,"\\'")+'\')">'+'<span class="'+(m.done?'move-done':'')+'">'+m.text+'</span></div>'});
    h+='</div>';
  }
  return h;
}

function toggleMove(villainId,moveText){
  var v=dbGetById('villains',villainId);if(!v)return;
  v.moves.forEach(function(m){if(m.text===moveText)m.done=!m.done});
  dbUpdate('villains',villainId,{moves:v.moves});
  renderLibrary();
}

function filterLibrary(q){
  var items=dbGetAll(selectedLibTab);
  if(q)items=items.filter(function(i){return i.name.toLowerCase().indexOf(q.toLowerCase())>-1});
  document.getElementById('lib-list-items').innerHTML=renderLibList(items);
}

/* ══════════════════════════════════════════════
   RENDER: PLAYERS
   ══════════════════════════════════════════════ */
function renderPlayers(){
  var el=document.getElementById('players-content');if(!el)return;
  var pls=dbGetAll('players');
  if(pls.length===0){
    el.innerHTML='<div class="empty-state"><div class="empty-state-title">No hay jugadores</div><div class="empty-state-desc">Agrega a los héroes de tu mesa.</div><button class="btn btn-primary" onclick="openModal(\'players\',null)">+ Agregar jugador</button></div>';
    return;
  }
  var h='<div class="section-label">PERSONAJES JUGADORES</div><div style="margin-bottom:12px"><button class="btn btn-primary" onclick="openModal(\'players\',null)">+ Agregar jugador</button></div>';
  h+='<div class="player-grid">';
  pls.forEach(function(p){
    var r=resolvePlayer(p);
    h+='<div class="player-card" style="border-color:'+(r.factionColor||'var(--border)')+'">';
    h+='<div class="player-card-header"><div class="player-avatar" style="background:'+r.bg+';color:'+r.fg+'">'+r.initial+'</div>';
    h+='<div><div class="player-card-name">'+r.name+'</div><div class="player-card-class">'+r.cls+(r.sub?' · '+r.sub:'')+(r.kit?' · Kit '+r.kit:'')+' · Plano '+r.plano+'</div></div></div>';
    h+='<div class="player-meta"><span class="player-tag faction">'+r.faction+'</span><span class="player-tag">HP '+r.hp+'</span><span class="player-tag">Aen +'+r.aenRegen+'/turno</span></div>';
    if(r.backstory)h+='<div style="font-size:13px;color:var(--ink3);margin-top:8px;line-height:1.5">'+r.backstory+'</div>';
    // Echo points
    h+='<div class="echo-tracker"><div class="echo-tracker-label">ECHO</div><div class="echo-dots">';
    for(var i=0;i<5;i++)h+='<div class="echo-dot'+(i<r.echo?' filled':'')+'">✦</div>';
    h+='</div><button class="echo-btn" onclick="adjustEcho(\''+p.id+'\',1)" style="padding:4px 10px;font-size:12px;min-height:32px">+1</button></div>';
    // Actions
    h+='<div style="display:flex;gap:6px;margin-top:10px"><button class="btn" onclick="openModal(\'players\',\''+p.id+'\')">Editar</button><button class="delete-btn" onclick="if(confirm(\'¿Eliminar '+r.name+'?\')){dbDelete(\'players\',\''+p.id+'\');renderPlayers()}">×</button></div>';
    h+='</div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

function adjustEcho(pid,delta){
  var p=dbGetById('players',pid);if(!p)return;
  p.echo=Math.max(0,Math.min(5,(p.echo||0)+delta));
  dbUpdate('players',pid,{echo:p.echo});
  renderPlayers();
}

/* ══════════════════════════════════════════════
   RENDER: SCENE BUILDER
   ══════════════════════════════════════════════ */
function renderSceneBuilder(sceneId){
  var el=document.getElementById('scenes-content');if(!el)return;
  if(!sceneId){
    el.innerHTML='<div class="empty-state"><div class="empty-state-title">Scene Builder</div><div class="empty-state-desc">Selecciona una escena desde Campaña o crea una nueva.</div><button class="btn btn-primary" onclick="openModal(\'scene\',null)">+ Nueva escena</button></div>';
    return;
  }
  var s=dbGetById('scenes',sceneId);
  if(!s){el.innerHTML='<div class="empty-state">Escena no encontrada</div>';return}
  var setup=s.setup||{};
  var h='<div class="section-label">SCENE BUILDER</div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div class="detail-name">'+s.name+'</div>';
  h+='<div style="display:flex;gap:8px"><span class="scene-badge '+(s.type==='combat'?'badge-combat':'badge-social')+'">'+(s.type==='combat'?'Combate':'Narrativa')+'</span>';
  h+='<button class="btn" onclick="openModal(\'scene\',\''+s.id+'\')">Editar</button>';
  h+='<button class="btn" style="color:var(--red);border-color:var(--red)" onclick="if(confirm(\'¿Eliminar esta escena?\')){dbDelete(\'scenes\',\''+s.id+'\');selectedSceneId=null;nav(\'campaign\')}">Eliminar</button></div></div>';
  // Setup display
  var fields=[['HOOK',setup.hook],['CONFLICTO',setup.conflict],['BEAT DE SALIDA',setup.exit]];
  fields.forEach(function(f){if(f[1])h+='<div class="form-section"><div class="form-label">'+f[0]+'</div><div style="font-size:14px;color:var(--ink2);line-height:1.6">'+f[1]+'</div></div>'});
  if(setup.stakesFail||setup.stakesWin){
    h+='<div class="form-section"><div class="form-label">STAKES</div><div class="stakes-row">';
    h+='<div class="stake-box stake-fail"><div class="stake-label">SI FALLAN</div><div style="font-size:14px">'+(setup.stakesFail||'—')+'</div></div>';
    h+='<div class="stake-box stake-win"><div class="stake-label">SI TRIUNFAN</div><div style="font-size:14px">'+(setup.stakesWin||'—')+'</div></div></div></div>';
  }
  // Participants
  if(s.participants){
    var npcs=(s.participants.npcIds||[]).map(function(id){return dbGetById('npcs',id)}).filter(Boolean);
    if(npcs.length>0){
      h+='<div class="form-section"><div class="form-label">NPCs</div>';
      npcs.forEach(function(n){h+='<div class="npc-card"><div class="npc-name">'+n.name+'</div><div class="npc-role">'+(n.role||'')+'</div>'+(n.voice?'<div class="npc-voice">"'+n.voice+'"</div>':'')+'</div>'});
      h+='</div>';
    }
    var creatures=(s.participants.creatureIds||[]);
    if(creatures.length>0){
      h+='<div class="form-section"><div class="form-label">CRIATURAS</div>';
      creatures.forEach(function(ci){
        var c=dbGetById('bestiary',ci.creatureId);
        if(c)h+='<div class="creature-card"><div style="display:flex;justify-content:space-between"><div><span class="creature-name">'+c.name+'</span><span style="color:var(--ink3)"> ×'+ci.qty+'</span></div><span class="difficulty-tag diff-'+(c.difficulty||'medium')+'">'+diffLabel(c.difficulty)+'</span></div><div class="creature-stats-row"><span class="creature-stat hp">HP '+c.hp+'</span><span class="creature-stat dmg">'+c.dmg+'</span></div></div>';
      });
      h+='</div>';
    }
  }
  // Lair actions
  if(s.lairActions&&s.lairActions.length>0){
    h+='<div class="form-section"><div class="form-label">LAIR ACTIONS</div><div class="lair-section">';
    s.lairActions.forEach(function(la){h+='<div style="padding:6px 0;font-size:14px">· '+la+'</div>'});
    h+='</div></div>';
  }
  // Combat start button
  if(s.type==='combat')h+='<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:16px;padding:16px" onclick="startCombatFromScene(\''+s.id+'\')">Iniciar combate</button>';
  // Debrief section
  h+='<div style="margin-top:24px;padding:16px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg)">';
  h+='<div class="form-label">DEBRIEF</div>';
  if(s.debrief){
    if(s.debrief.whatHappened)h+='<div style="font-size:14px;color:var(--ink2);margin-bottom:12px;line-height:1.6">'+s.debrief.whatHappened+'</div>';
    if(s.debrief.consequences)s.debrief.consequences.forEach(function(c){h+='<div class="scene-flag flag-consequence" style="margin-bottom:6px">⚠ '+c+'</div>'});
  }
  h+='<textarea class="form-input" id="debrief-text" placeholder="¿Qué pasó realmente?">'+(s.debrief&&s.debrief.whatHappened?s.debrief.whatHappened:'')+'</textarea>';
  h+='<textarea class="form-input" id="debrief-consequences" style="margin-top:8px" placeholder="Consecuencias (una por línea)">'+(s.debrief&&s.debrief.consequences?s.debrief.consequences.join('\n'):'')+'</textarea>';
  h+='<button class="btn btn-primary" style="margin-top:10px" onclick="saveDebrief(\''+s.id+'\')">Guardar debrief</button>';
  h+='</div>';
  el.innerHTML=h;
}

function saveDebrief(sceneId){
  var text=document.getElementById('debrief-text').value;
  var cons=document.getElementById('debrief-consequences').value.split('\n').filter(function(c){return c.trim()});
  dbUpdate('scenes',sceneId,{debrief:{whatHappened:text,consequences:cons},status:'debriefed'});
  renderSceneBuilder(sceneId);
}

/* ══════════════════════════════════════════════
   COMBAT TRACKER
   ══════════════════════════════════════════════ */
function startCombatFromScene(sceneId){
  var scene=dbGetById('scenes',sceneId);if(!scene)return;
  var units=[];expandedUnits={};
  var pls=dbGetAll('players');
  pls.forEach(function(p){
    var r=resolvePlayer(p);
    units.push({id:p.id,name:r.name,type:'player',initial:r.initial,bg:r.bg,fg:r.fg,cls:r.cls,plano:r.plano,abilities:r.abilities,hp:0,hpMax:0,actions:{mov:false,act1:false,act2:false},conditions:[]});
  });
  if(scene.participants&&scene.participants.creatureIds){
    scene.participants.creatureIds.forEach(function(ci){
      var c=dbGetById('bestiary',ci.creatureId);if(!c)return;
      for(var i=1;i<=ci.qty;i++){
        units.push({id:c.id+'-'+i,name:c.name+(ci.qty>1?' #'+i:''),type:'creature',hp:c.hp,hpMax:c.hp,dmg:c.dmg||'',resist:c.resist||'',diff:c.difficulty||'medium',abilities:c.abilities||[],actions:{mov:false,act1:false,act2:false},conditions:[]});
      }
    });
  }
  combat={name:scene.name,sceneId:sceneId,round:1,turnIndex:0,units:units,order:units.map(function(u){return u.id}),lairActions:(scene.lairActions||[]).map(function(la,i){return{id:'la'+i,text:la,used:false}}),log:[]};
  nav('session');
}

function endCombat(){combat=null;expandedUnits={};renderSession()}
function nextTurn(){
  if(!combat)return;
  combat.turnIndex=(combat.turnIndex+1)%combat.order.length;
  if(combat.turnIndex===0){combat.round++;combat.units.forEach(function(u){u.actions={mov:false,act1:false,act2:false}});combat.lairActions.forEach(function(la){la.used=false})}
  var nx=combat.units.find(function(u){return u.id===combat.order[combat.turnIndex]});
  if(nx)nx.actions={mov:false,act1:false,act2:false};
  renderSession();
}
function adjustHp(uid,delta){var u=combat.units.find(function(u){return u.id===uid});if(u)u.hp=Math.max(0,Math.min(u.hpMax,u.hp+delta));renderSession()}
function toggleAction(uid,act){var u=combat.units.find(function(u){return u.id===uid});if(!u)return;u.actions[act]=!u.actions[act];if(u.actions.mov&&u.actions.act1&&u.actions.act2)setTimeout(function(){nextTurn()},400);else renderSession()}
function toggleExpand(uid){expandedUnits[uid]=!expandedUnits[uid];renderSession()}
function useLairAction(lid){var la=combat.lairActions.find(function(l){return l.id===lid});if(la)la.used=true;renderSession()}
function addEchoTracker(pid){var p=dbGetById('players',pid);if(p&&(p.echo||0)<5){p.echo=(p.echo||0)+1;dbUpdate('players',pid,{echo:p.echo})}renderSession()}

function renderSession(){
  var el=document.getElementById('session-content');if(!el)return;
  if(!combat){
    el.innerHTML='<div class="empty-state"><div class="empty-state-title">No hay combate activo</div><div class="empty-state-desc">Inicia un combate desde una escena de tipo Combate en la vista de Campaña.</div></div>';
    return;
  }
  var h='';
  h+='<div class="tracker-bar"><div style="font-size:17px;font-weight:700;font-family:var(--serif);flex:1">'+combat.name+'</div>';
  h+='<div class="tracker-stat"><div class="tracker-stat-label">RONDA</div><div class="tracker-stat-value">'+combat.round+'</div></div>';
  h+='<div class="tracker-stat"><div class="tracker-stat-label">TURNO</div><div class="tracker-stat-value">'+(combat.turnIndex+1)+'/'+combat.order.length+'</div></div>';
  h+='<button class="btn btn-primary" onclick="nextTurn()">Siguiente →</button>';
  h+='<button class="btn" onclick="endCombat()">Terminar</button></div>';
  // Initiative
  h+='<div class="initiative-bar" id="init-bar">';
  combat.order.forEach(function(id,idx){
    var u=combat.units.find(function(x){return x.id===id});
    var cls='init-chip';
    if(idx===combat.turnIndex)cls+=' active';
    if(idx<combat.turnIndex)cls+=' done';
    if(u.type==='creature'&&u.hp<=0)cls+=' dead';
    if(u.type==='player')cls+=' player';
    if(u.type==='player'&&idx>combat.turnIndex)cls+=' sinergia-eligible';
    var lbl=u.type==='player'?u.initial:u.name.substring(0,8);
    h+='<div class="'+cls+'" onclick="toggleExpand(\''+u.id+'\')" title="'+u.name+'">'+lbl+'</div>';
  });
  h+='</div>';
  // Sinergia
  var sp=[];combat.order.forEach(function(id,idx){var u=combat.units.find(function(x){return x.id===id});if(u.type==='player'&&idx>combat.turnIndex)sp.push(u.name)});
  if(sp.length>0)h+='<div style="font-size:13px;color:var(--gold);margin-bottom:12px;padding:8px 14px;background:var(--gold-pale);border-radius:var(--r)">Sinergia: <strong>'+sp.join(', ')+'</strong></div>';
  // Units
  combat.order.forEach(function(id,idx){
    var u=combat.units.find(function(x){return x.id===id});
    var isAct=idx===combat.turnIndex;var isDead=u.type==='creature'&&u.hp<=0;var isExp=expandedUnits[u.id];
    h+='<div class="unit-card-tracker'+(isAct?' active-unit':'')+(isDead?' dead-unit':'')+'">';
    h+='<div class="unit-header"><div style="cursor:pointer;flex:1" onclick="toggleExpand(\''+u.id+'\')">';
    if(u.type==='player'){h+='<div style="display:flex;align-items:center;gap:10px"><div class="sb-player" style="background:'+u.bg+';color:'+u.fg+'">'+u.initial+'</div><div><div class="unit-name">'+u.name+' <span style="font-size:12px;color:var(--ink4)">'+(isExp?'▲':'▼')+'</span></div><div class="unit-meta">'+u.cls+' · Plano '+u.plano+'</div></div></div>'}
    else{h+='<div><div class="unit-name">'+u.name+' <span style="font-size:12px;color:var(--ink4)">'+(isExp?'▲':'▼')+'</span></div><div class="unit-meta">Daño '+u.dmg+(u.resist?' · Resist: '+u.resist:'')+' <span class="difficulty-tag diff-'+u.diff+'">'+diffLabel(u.diff)+'</span></div></div>'}
    h+='</div>';
    if(u.type==='creature'){h+='<div class="hp-controls"><input type="number" id="hp-'+u.id+'" placeholder="0" min="1"><button class="btn btn-damage" onclick="event.stopPropagation();var v=parseInt(document.getElementById(\'hp-'+u.id+'\').value)||0;adjustHp(\''+u.id+'\',-v);document.getElementById(\'hp-'+u.id+'\').value=\'\'">Daño</button><button class="btn btn-heal" onclick="event.stopPropagation();var v=parseInt(document.getElementById(\'hp-'+u.id+'\').value)||0;adjustHp(\''+u.id+'\',v);document.getElementById(\'hp-'+u.id+'\').value=\'\'">Sana</button></div>'}
    h+='</div>';
    if(u.type==='creature'){var pct=Math.round((u.hp/u.hpMax)*100);h+='<div class="hp-section"><div class="hp-display" style="color:'+getHpColor(pct)+'">'+u.hp+'<span style="font-size:13px;color:var(--ink4)">/'+u.hpMax+'</span></div><div class="hp-bar"><div class="hp-fill" style="width:'+pct+'%;background:'+getHpColor(pct)+'"></div></div></div>'}
    h+='<div class="actions-row"><label class="action-check"><input type="checkbox" '+(u.actions.mov?'checked':'')+' onchange="toggleAction(\''+u.id+'\',\'mov\')"> Mov</label><label class="action-check"><input type="checkbox" '+(u.actions.act1?'checked':'')+' onchange="toggleAction(\''+u.id+'\',\'act1\')"> Acción 1</label><label class="action-check"><input type="checkbox" '+(u.actions.act2?'checked':'')+' onchange="toggleAction(\''+u.id+'\',\'act2\')"> Acción 2</label></div>';
    if(isExp&&u.abilities&&u.abilities.length>0){h+='<div class="abilities-compact"><div class="form-label" style="margin-bottom:6px">HABILIDADES</div>';u.abilities.forEach(function(a){h+='<div class="ability-line"><span class="ability-name">'+a.name+'</span> <span style="color:var(--ink4)">['+a.type+']</span>'+(a.cost?' <span style="color:var(--gold)">'+a.cost+'</span>':'')+'<div style="font-size:12px;color:var(--ink3)">'+a.desc+'</div></div>'});h+='</div>'}
    h+='</div>';
  });
  // Lair
  if(combat.lairActions.length>0){h+='<div class="lair-panel"><div class="form-label" style="color:var(--orange)">LAIR ACTIONS — Ronda '+combat.round+'</div>';combat.lairActions.forEach(function(la){h+='<div class="lair-action-btn'+(la.used?' used':'')+'" onclick="useLairAction(\''+la.id+'\')"><input type="checkbox" style="width:20px;height:20px;pointer-events:none" '+(la.used?'checked':'')+'> '+la.text+'</div>'});h+='</div>'}
  // Echo
  h+='<div class="echo-panel"><div class="form-label" style="color:var(--gold)">ECHO POINTS</div>';
  dbGetAll('players').forEach(function(p){h+='<div class="echo-row"><div style="display:flex;align-items:center;gap:10px"><div class="sb-player" style="background:'+(p.bg||'#444')+';color:'+(p.fg||'#fff')+'">'+(p.initial||p.name.charAt(0))+'</div><div class="echo-player-name">'+p.name+'</div></div><div style="display:flex;align-items:center;gap:8px"><div class="echo-count">'+(p.echo||0)+'</div><button class="echo-btn" onclick="addEchoTracker(\''+p.id+'\')">+1</button></div></div>'});
  h+='</div>';
  el.innerHTML=h;
}

/* ══════════════════════════════════════════════
   RENDER: SETTINGS
   ══════════════════════════════════════════════ */
function renderSettings(){
  var el=document.getElementById('settings-content');if(!el)return;
  var h='<div class="section-label">CONFIGURACIÓN</div>';
  // Gamedata info
  h+='<div style="background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:16px"><div class="form-label">GAME DATA</div><div style="font-size:14px;color:var(--ink2);line-height:1.8">';
  if(typeof GAMEDATA!=='undefined'){h+='Clases: '+GAMEDATA.classes.length+' ('+GAMEDATA.classes.reduce(function(a,c){return a+c.subclasses.length},0)+' subclases)<br>Facciones: '+GAMEDATA.factions.length+'<br>Kits: '+GAMEDATA.kits.length+'<br>Condiciones: '+GAMEDATA.conditions.length}
  else{h+='⚠ gamedata.js no encontrado'}
  h+='<br><br>';
  DB_TABLES.forEach(function(t){var d=dbLoad(t);var c=Array.isArray(d)?d.length:(d?1:0);h+=t+': '+c+'<br>'});
  h+='</div></div>';
  // Export
  h+='<div style="background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:16px"><div class="form-label">EXPORTAR</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">';
  DB_TABLES.forEach(function(t){h+='<button class="btn" onclick="exportDB(\''+t+'\')">'+t+'</button>'});
  h+='<button class="btn btn-primary" onclick="exportAll()">Todo</button></div></div>';
  // Import
  h+='<div style="background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:16px"><div class="form-label">IMPORTAR</div><input type="file" accept=".json" style="font-size:14px;margin-top:8px" onchange="importFile(this)"><div id="import-status" style="margin-top:8px;font-size:13px"></div></div>';
  // Reset
  h+='<div style="background:var(--surface);border:2px solid var(--red);border-radius:var(--r-lg);padding:18px"><div class="form-label" style="color:var(--red)">ZONA DE PELIGRO</div><button class="btn" style="border-color:var(--red);color:var(--red);margin-top:8px" onclick="if(confirm(\'¿Borrar TODO?\')){DB_TABLES.forEach(function(t){localStorage.removeItem(dbKey(t))});localStorage.removeItem(dbKey(\'_initialized\'));location.reload()}">Resetear datos</button></div>';
  el.innerHTML=h;
}

function exportDB(t){var d=dbLoad(t);if(!d){alert('Sin datos');return}var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='eq_'+t+'.json';a.click()}
function exportAll(){var all={};DB_TABLES.forEach(function(t){all[t]=dbLoad(t)});var b=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='eq_backup_'+new Date().toISOString().split('T')[0]+'.json';a.click()}
function importFile(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.campaign||d.npcs||d.scenes){DB_TABLES.forEach(function(t){if(d[t])dbSave(t,d[t])});document.getElementById('import-status').innerHTML='✅ Importado'}else if(Array.isArray(d)){var n=f.name.replace('eq_','').replace('.json','');if(DB_TABLES.includes(n)){dbSave(n,d);document.getElementById('import-status').innerHTML='✅ '+n+' importado'}}}catch(err){document.getElementById('import-status').innerHTML='❌ Error: '+err.message}input.value=''};r.readAsText(f)}

/* ══════════════════════════════════════════════
   MODALS — Create/Edit forms
   ══════════════════════════════════════════════ */
function openModal(type,id){
  var item=null;
  var table=type;
  if(id)item=dbGetById(table,id);
  var title=(id?'Editar':'Crear')+' '+{npcs:'NPC',villains:'Villano',bestiary:'Criatura',loot:'Item',players:'Jugador',scene:'Escena',campaign:'Campaña'}[type];
  var fields=getFormFields(type,item);
  var h='<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">'+title+'</div>';
  h+=fields;
  h+='<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveModal(\''+type+'\','+(id?'\''+id+'\'':'null')+')">Guardar</button></div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
}

function closeModal(){document.getElementById('modal-root').innerHTML=''}

function getFormFields(type,item){
  var v=item||{};var h='';
  function field(label,name,val,placeholder,textarea){
    h+='<div class="form-section"><div class="form-label">'+label+'</div>';
    if(textarea)h+='<textarea class="form-input" id="f-'+name+'" placeholder="'+(placeholder||'')+'">'+(val||'')+'</textarea>';
    else h+='<input class="form-input" id="f-'+name+'" type="text" value="'+(val||'').replace(/"/g,'&quot;')+'" placeholder="'+(placeholder||'')+'">';
    h+='</div>';
  }
  function select(label,name,options,val){
    h+='<div class="form-section"><div class="form-label">'+label+'</div><select class="form-input" id="f-'+name+'">';
    options.forEach(function(o){h+='<option value="'+o.value+'" '+(val===o.value?'selected':'')+'>'+o.label+'</option>'});
    h+='</select></div>';
  }

  if(type==='campaign'){
    field('Nombre','name',v.name,'Nombre de la campaña');
  }
  if(type==='scene'){
    field('Nombre','name',v.name,'Nombre de la escena');
    select('Tipo','type',[{value:'combat',label:'Combate'},{value:'narrative',label:'Narrativa'}],v.type||'narrative');
    field('Hook','hook',v.setup?v.setup.hook:'','¿Cómo abre la escena?',true);
    field('Conflicto','conflict',v.setup?v.setup.conflict:'','¿Qué hay que resolver?',true);
    field('Si fallan','stakesFail',v.setup?v.setup.stakesFail:'','¿Qué pierden?');
    field('Si triunfan','stakesWin',v.setup?v.setup.stakesWin:'','¿Qué ganan?');
    field('Beat de salida','exit',v.setup?v.setup.exit:'','¿Cómo conecta con lo siguiente?',true);
    field('Lair Actions (una por línea)','lairActions',(v.lairActions||[]).join('\n'),'',true);
    field('Notas DM','notes',v.notes,'Recordatorios, música...',true);
  }
  if(type==='npcs'){
    field('Nombre','name',v.name,'Nombre del NPC');
    field('Rol','role',v.role,'Ej: Comerciante, Autoridad, Espía');
    field('Raza','race',v.race,'Ej: Humano, Elfo, Goblin');
    field('Motivación','motivation',v.motivation,'¿Qué lo mueve?',true);
    field('Lo que sabe','knows',v.knows,'Información que puede revelar',true);
    field('Lo que quiere','wants',v.wants,'¿Qué busca?',true);
    field('Voz','voice',v.voice,'Una frase ejemplo de cómo habla');
  }
  if(type==='villains'){
    field('Nombre','name',v.name,'Nombre del villano');
    field('Rol','role',v.role,'Ej: Líder, Agente, Mercenario');
    select('Estado','status',[{value:'prepared',label:'Preparado'},{value:'active',label:'Activo'}],v.status||'prepared');
    field('Motivación','motivation',v.motivation,'',true);
    field('Arco narrativo','arc',v.arc,'Fases del plan del villano',true);
    field('HP','hp',v.stats?v.stats.hp:'','');
    field('Daño','dmg',v.stats?v.stats.dmg:'','Ej: 8-14');
    field('Especial','special',v.stats?v.stats.special:'','Habilidad especial');
    field('Resistencia','resist',v.stats?v.stats.resist:'','');
  }
  if(type==='bestiary'){
    field('Nombre','name',v.name,'');
    var G=typeof GAMEDATA!=='undefined'?GAMEDATA:null;
    if(G)select('Tipo','btype',G.creatureTypes.map(function(t){return{value:t,label:t}}),v.type||'Bestia');
    else field('Tipo','btype',v.type,'Bestia, No-muerto, etc.');
    if(G)select('Dificultad','difficulty',G.difficulties.map(function(d){return{value:d.id,label:d.name}}),v.difficulty||'medium');
    else field('Dificultad','difficulty',v.difficulty,'easy/medium/hard/boss');
    field('HP','hp',v.hp,'');
    field('Daño','dmg',v.dmg,'Ej: 4-8');
    field('Resistencia','resist',v.resist,'');
    field('Terreno (separado por comas)','terrain',(v.terrain||[]).join(', '),'Bosque, Cueva, Ruinas');
    field('Descripción narrativa','description',v.description,'Cómo se ve, suena, huele',true);
    field('Lair Actions sugeridas (una por línea)','lairSugg',(v.lairSuggestions||[]).join('\n'),'',true);
  }
  if(type==='loot'){
    field('Nombre','name',v.name,'');
    select('Tipo','ltype',[{value:'Arma',label:'Arma'},{value:'Narrativo',label:'Narrativo'},{value:'Información',label:'Información'},{value:'Consumible',label:'Consumible'}],v.type||'Consumible');
    var G=typeof GAMEDATA!=='undefined'?GAMEDATA:null;
    if(G)select('Rareza','rarity',G.rarities.map(function(r){return{value:r.id,label:r.name}}),v.rarity||'common');
    field('Descripción','description',v.description,'',true);
    field('Efecto mecánico','effect',v.effect,'',true);
  }
  if(type==='players'){
    field('Nombre','name',v.name,'');
    field('Inicial','initial',v.initial||'','Una letra');
    field('Color fondo','bg',v.bg||'#444','Hex color');
    field('Color texto','fg',v.fg||'#fff','Hex color');
    var G=typeof GAMEDATA!=='undefined'?GAMEDATA:null;
    if(G){
      select('Facción','factionId',G.factions.map(function(f){return{value:f.id,label:f.name}}),v.factionId||'');
      select('Clase','classId',G.classes.map(function(c){return{value:c.id,label:c.nameEs+' ('+c.type+')'}}),v.classId||'');
      // Subclass - will show all, ideally filtered by class
      var allSubs=[];G.classes.forEach(function(c){c.subclasses.forEach(function(s){allSubs.push({value:s.id,label:c.nameEs+' → '+s.name})})});
      select('Subclase','subclassId',allSubs,v.subclassId||'');
      select('Kit','kitId',G.kits.map(function(k){return{value:k.id,label:k.name+' ('+k.fantasy+')'}}),v.kitId||'');
    }
    field('Plano','plano',v.plano||1,'1-4');
    field('Backstory','backstory',v.backstory||'','Historia del personaje',true);
  }
  return h;
}

function saveModal(type,id){
  function gv(name){var el=document.getElementById('f-'+name);return el?el.value.trim():''}
  var item={};
  if(type==='campaign'){
    item={id:id||'camp-'+uid(),name:gv('name'),arcs:[{id:'arc-1',name:'Arco I',beats:[]}]};
    dbSaveSingle('campaign',item);closeModal();nav('campaign');return;
  }
  if(type==='scene'){
    item={name:gv('name'),type:gv('type'),status:'ready',sporadic:false,
      setup:{hook:gv('hook'),conflict:gv('conflict'),stakesFail:gv('stakesFail'),stakesWin:gv('stakesWin'),exit:gv('exit')},
      participants:{npcIds:[],creatureIds:[]},
      lairActions:gv('lairActions').split('\n').filter(function(l){return l.trim()}),
      objectives:{session:'',scene:[],personal:{}},notes:gv('notes'),debrief:null};
    if(id){dbUpdate('scenes',id,item)}else{item.id='scene-'+uid();dbCreate('scenes',item);selectedSceneId=item.id}
    closeModal();nav('scenes');return;
  }
  if(type==='npcs'){
    item={name:gv('name'),role:gv('role'),race:gv('race'),motivation:gv('motivation'),knows:gv('knows'),wants:gv('wants'),voice:gv('voice'),appearsIn:[],tags:[]};
    if(id)dbUpdate('npcs',id,item);else dbCreate('npcs',item);
  }
  if(type==='villains'){
    item={name:gv('name'),role:gv('role'),status:gv('status'),motivation:gv('motivation'),arc:gv('arc'),
      stats:{hp:parseInt(gv('hp'))||0,dmg:gv('dmg'),special:gv('special'),resist:gv('resist')},abilities:[],moves:[],appearsIn:[]};
    if(id)dbUpdate('villains',id,item);else dbCreate('villains',item);
  }
  if(type==='bestiary'){
    item={name:gv('name'),type:gv('btype'),difficulty:gv('difficulty'),hp:parseInt(gv('hp'))||10,dmg:gv('dmg'),resist:gv('resist'),
      terrain:gv('terrain').split(',').map(function(t){return t.trim()}).filter(Boolean),
      description:gv('description'),abilities:[],
      lairSuggestions:gv('lairSugg').split('\n').filter(function(l){return l.trim()}),appearsIn:[]};
    if(id)dbUpdate('bestiary',id,item);else dbCreate('bestiary',item);
  }
  if(type==='loot'){
    item={name:gv('name'),type:gv('ltype'),rarity:gv('rarity'),description:gv('description'),effect:gv('effect'),delivered:false,intendedFor:null,plannedScene:null};
    if(id)dbUpdate('loot',id,item);else dbCreate('loot',item);
  }
  if(type==='players'){
    item={name:gv('name'),initial:gv('initial')||gv('name').charAt(0),bg:gv('bg'),fg:gv('fg'),
      factionId:gv('factionId'),classId:gv('classId'),subclassId:gv('subclassId'),kitId:gv('kitId'),
      plano:parseInt(gv('plano'))||1,backstory:gv('backstory'),echo:0};
    if(id){var old=dbGetById('players',id);if(old)item.echo=old.echo;dbUpdate('players',id,item)}
    else dbCreate('players',item);
  }
  closeModal();renderView(currentView);
}

/* ══════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════ */
nav('campaign');
</script>
